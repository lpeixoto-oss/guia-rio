<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Férias de Sonho — Rio de Janeiro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sun: #F5A623;
  --ocean: #1A6B8A;
  --sand: #F7EDD8;
  --palm: #2D6A4F;
  --terra: #C1440E;
  --cream: #FDF8F0;
  --ink: #1C1410;
  --muted: #8A7A6A;
  --border: rgba(28,20,16,0.1);
}

html { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.65;
  height: 100%;
}

/* ── NAV ── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--ocean);
  padding: 0.6rem 1rem;
}

.nav-title {
  font-family: 'Playfair Display', serif;
  font-size: 0.85rem;
  font-style: italic;
  color: rgba(255,255,255,0.7);
  margin-bottom: 0.4rem;
}

.nav-links {
  display: flex;
  gap: 0.35rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.nav-links::-webkit-scrollbar { display: none; }

.nav-links a {
  flex: 0 0 auto;
  white-space: nowrap;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  border: 1.5px solid rgba(255,255,255,0.3);
  text-decoration: none;
  color: rgba(255,255,255,0.85);
  transition: all 0.15s;
}
.nav-links a:hover,
.nav-links a.active {
  background: white;
  color: var(--ocean);
  border-color: white;
}

/* ── CONTENT ── */
.content {
  max-width: 720px;
  margin: 0 auto;
  padding: 1.5rem 1rem 5rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

/* ── CARDS ── */
.dia {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}

.card-header {
  padding: 1.2rem 1.4rem 0.9rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 0.9rem;
}

#essenciais .card-header { background: var(--ocean); }
#essenciais .card-header h2 { color: white; }
#essenciais .day-badge { background: rgba(255,255,255,0.2); color: white; }

.day-badge {
  flex-shrink: 0;
  width: 42px; height: 42px;
  border-radius: 10px;
  background: var(--sand);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.2;
}

.card-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.25;
  padding-top: 0.2rem;
}

.card-body {
  padding: 1.2rem 1.4rem 1.4rem;
}

/* ── BLOCOS ── */
.bloco { margin-bottom: 1.2rem; }
.bloco:last-child { margin-bottom: 0; }

.bloco-titulo {
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ocean);
  margin-bottom: 0.45rem;
}

h3 {
  font-size: 0.93rem;
  font-weight: 600;
  margin: 0.9rem 0 0.3rem;
}
h3:first-child { margin-top: 0; }

p { font-size: 0.88rem; color: #3a2e26; margin-bottom: 0.4rem; }
p:last-child { margin-bottom: 0; }

ul, ol { padding-left: 1.1rem; font-size: 0.88rem; color: #3a2e26; }
li { margin-bottom: 0.25rem; }

strong { color: var(--ink); font-weight: 600; }
a { color: var(--ocean); text-decoration: none; }
a:hover { text-decoration: underline; }

hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

mark {
  background: rgba(245,166,35,0.2);
  color: var(--terra);
  padding: 0.1em 0.35em;
  border-radius: 4px;
  font-size: 0.85em;
}

/* ── DESTAQUE BOX ── */
.destaque {
  background: var(--sand);
  border-left: 3px solid var(--sun);
  border-radius: 0 8px 8px 0;
  padding: 0.7rem 0.9rem;
  margin: 0.6rem 0;
  font-size: 0.86rem;
  color: #3a2e26;
}
.destaque strong {
  display: block;
  margin-bottom: 0.2rem;
  color: var(--terra);
}

/* ── TAGS ── */
.tag {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 0.15em 0.5em;
  border-radius: 999px;
  margin-right: 0.25rem;
}
.tag-sun  { background: rgba(245,166,35,0.15); color: #a0690a; }
.tag-ocean { background: rgba(26,107,138,0.12); color: var(--ocean); }
.tag-palm  { background: rgba(45,106,79,0.12);  color: var(--palm); }

/* ── ESSENCIAIS GRID ── */
.essencial-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 0.5rem;
}
.essencial-item {
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  background: var(--sand);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 0.45rem;
  text-decoration: none;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 2rem 1rem 3rem;
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}
  </style>
</head>
<body>

  <nav>
    <div class="nav-title">Rio de Janeiro 🇧🇷</div>
    <div class="nav-links" id="nav-links">
      <a href="#essenciais">⭐ Essenciais</a>
      <a href="#dia-29">29 Jun</a>
      <a href="#dia-30">30 Jun</a>
      <a href="#dia-31">31 Jun</a>
      <a href="#dia-1">1 Jul</a>
      <a href="#dia-2">2 Jul</a>
      <a href="#dia-3">3 Jul</a>
      <a href="#dia-4">4 Jul</a>
      <a href="#dia-5">5 Jul</a>
      <a href="#dia-6">6 Jul</a>
      <a href="#dia-7">7 Jul</a>
      <a href="#dia-8">8 Jul</a>
      <a href="#dia-9">9 Jul</a>
      <a href="#dia-10">10 Jul</a>
      <a href="#dia-11">11 Jul</a>
    </div>
  </nav>

  <footer>Rio de Janeiro · Junho–Julho 2025 · Férias de Sonho</footer>

</body>
</html>
